<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesys Cloud - Parked Email Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .hidden {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
            font-size: 14px;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .refresh-info {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .copy-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 5px;
        }

        .copy-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📧 Genesys Cloud - Parked Email Monitor</h1>
            <p class="subtitle">Monitor currently parked email conversations</p>

            <div id="statusMessage" class="status"></div>

            <div id="querySection">
                <h3 style="margin-bottom: 20px; color: #333;">Parked Email Conversations</h3>
                <button id="queryBtn" onclick="queryConversations()">🔍 Query Parked Emails</button>
                <button onclick="queryConversations()" style="background: #28a745;">🔄 Refresh</button>
                <button onclick="logout()" style="background: #dc3545;">🚪 Logout</button>
                <p class="refresh-info">Showing currently parked email conversations</p>
            </div>
        </div>

        <div id="resultsSection" class="card hidden">
            <h2 style="margin-bottom: 20px; color: #333;">Results</h2>
            
            <div id="statsSection" class="stats hidden">
                <div class="stat-card">
                    <div class="stat-number" id="totalConversations">0</div>
                    <div class="stat-label">Total Conversations</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="uniqueQueues">0</div>
                    <div class="stat-label">Unique Queues</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="uniqueUsers">0</div>
                    <div class="stat-label">Unique Users</div>
                </div>
            </div>

            <div id="tableContainer"></div>
        </div>
    </div>

    <script>
        const REGION = 'euw2.pure.cloud';
        const BASE_URL = `https://api.${REGION}`;
        const LOGIN_URL = `https://login.${REGION}`;
        let accessToken = null;
        let tokenExpiry = null;

        // Configuration - Add your Client ID here
        const CLIENT_ID = 'e1f0834d-492c-40ff-9446-85e5e521eff4'; // REQUIRED: Add your Genesys Cloud OAuth Client ID

        // Initialize on page load
        window.onload = function() {
            if (!CLIENT_ID) {
                showStatus('❌ Error: CLIENT_ID not configured. Please add your Client ID on line 242.', 'error');
                return;
            }

            // Check if we're returning from OAuth redirect (token in URL fragment)
            handleOAuthCallback();
            
            // Check for existing token
            if (!accessToken) {
                checkExistingToken();
            }
        };

        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 5000);
            }
        }

        function initiateLogin() {
            const redirectUri = window.location.origin + window.location.pathname;
            
            console.log('Initiating login with Implicit Grant:', {
                clientId: CLIENT_ID,
                redirectUri: redirectUri,
                region: REGION
            });
            
            // Generate random state for CSRF protection
            const state = generateRandomString(32);
            sessionStorage.setItem('oauth_state', state);

            // Build authorization URL for Implicit Grant (Token)
            const authUrl = `${LOGIN_URL}/oauth/authorize?` +
                `response_type=token&` +
                `client_id=${encodeURIComponent(CLIENT_ID)}&` +
                `redirect_uri=${encodeURIComponent(redirectUri)}&` +
                `state=${state}`;

            console.log('Redirecting to Genesys Cloud login');
            window.location.href = authUrl;
        }

        function handleOAuthCallback() {
            // Token comes back in URL fragment (#access_token=...)
            const hash = window.location.hash.substring(1);
            if (!hash) return;
            
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');
            const state = params.get('state');
            const expiresIn = params.get('expires_in');
            const error = params.get('error');
            const errorDescription = params.get('error_description');
            
            // Check for OAuth errors
            if (error) {
                showStatus(`❌ OAuth Error: ${error} - ${errorDescription || ''}`, 'error');
                console.error('OAuth Error:', { error, errorDescription });
                sessionStorage.clear();
                return;
            }
            
            if (token) {
                console.log('✓ Token received from OAuth');
                
                // Verify state to prevent CSRF
                const savedState = sessionStorage.getItem('oauth_state');
                if (state && savedState && state !== savedState) {
                    showStatus('❌ Invalid state parameter. Possible CSRF attack.', 'error');
                    console.error('State mismatch');
                    return;
                }
                
                // Store token
                accessToken = token;
                const expiryTime = Date.now() + (parseInt(expiresIn || 86400) * 1000);
                tokenExpiry = expiryTime;
                
                sessionStorage.setItem('access_token', token);
                sessionStorage.setItem('token_expiry', expiryTime.toString());
                sessionStorage.removeItem('oauth_state');
                
                // Clean up URL
                window.history.replaceState({}, document.title, window.location.pathname);
                
                showStatus('✅ Authentication successful!', 'success');
            }
        }

        function checkExistingToken() {
            const savedToken = sessionStorage.getItem('access_token');
            const savedExpiry = sessionStorage.getItem('token_expiry');
            
            if (savedToken && savedExpiry && Date.now() < parseInt(savedExpiry)) {
                accessToken = savedToken;
                tokenExpiry = parseInt(savedExpiry);
                console.log('✓ Using existing token');
                showStatus('✅ Already authenticated', 'success');
            } else {
                // No valid token, initiate login
                console.log('No valid token found, initiating login...');
                showStatus('🔄 Redirecting to login...', 'info');
                setTimeout(() => initiateLogin(), 1000);
            }
        }

        function logout() {
            accessToken = null;
            tokenExpiry = null;
            sessionStorage.clear();
            showStatus('🔄 Logging out...', 'info');
            setTimeout(() => initiateLogin(), 1000);
        }

        function generateRandomString(length) {
            const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            const values = new Uint8Array(length);
            window.crypto.getRandomValues(values);
            for (let i = 0; i < length; i++) {
                result += charset[values[i] % charset.length];
            }
            return result;
        }

        async function queryConversations() {
            if (!accessToken) {
                showStatus('Please authenticate first', 'error');
                initiateLogin();
                return;
            }

            const queryBtn = document.getElementById('queryBtn');
            queryBtn.disabled = true;
            queryBtn.textContent = '🔄 Querying...';

            try {
                // Query for active email conversations
                const queryPayload = {
                    interval: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString() + '/' + new Date().toISOString(),
                    order: 'desc',
                    orderBy: 'conversationStart',
                    paging: {
                        pageSize: 100,
                        pageNumber: 1
                    },
                    segmentFilters: [
                        {
                            type: 'and',
                            predicates: [
                                {
                                    type: 'dimension',
                                    dimension: 'mediaType',
                                    value: 'email'
                                },
                                {
                                    type: 'dimension',
                                    dimension: 'queueId',
                                    operator: 'exists'
                                }
                            ]
                        }
                    ],
                    conversationFilters: [
                        {
                            type: 'and',
                            predicates: [
                                {
                                    type: 'dimension',
                                    dimension: 'conversationEnd',
                                    operator: 'notExists'
                                }
                            ]
                        }
                    ]
                };

                console.log('Querying conversations API...');
                const response = await fetch(`${BASE_URL}/api/v2/analytics/conversations/details/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify(queryPayload)
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        showStatus('❌ Session expired. Redirecting to login...', 'error');
                        sessionStorage.clear();
                        setTimeout(() => initiateLogin(), 2000);
                        return;
                    }
                    const errorData = await response.json();
                    throw new Error(errorData.message || `Query failed: ${response.status}`);
                }

                const data = await response.json();
                console.log('✓ Query successful:', data.conversations?.length || 0, 'conversations');
                displayResults(data.conversations || []);
                showStatus(`✅ Found ${data.conversations?.length || 0} parked email conversations`, 'success');

            } catch (error) {
                console.error('Query error:', error);
                showStatus(`❌ Query failed: ${error.message}`, 'error');
            } finally {
                queryBtn.disabled = false;
                queryBtn.textContent = '🔍 Query Parked Emails';
            }
        }

        function displayResults(conversations) {
            const resultsSection = document.getElementById('resultsSection');
            const tableContainer = document.getElementById('tableContainer');
            const statsSection = document.getElementById('statsSection');

            resultsSection.classList.remove('hidden');

            if (conversations.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <p>No parked email conversations found</p>
                    </div>
                `;
                statsSection.classList.add('hidden');
                return;
            }

            // Extract parked email conversation data
            const parkedEmails = [];
            const uniqueQueues = new Set();
            const uniqueUsers = new Set();

            conversations.forEach(conv => {
                conv.participants?.forEach(participant => {
                    participant.sessions?.forEach(session => {
                        session.segments?.forEach(segment => {
                            // Filter for email media type and queued segments
                            if (segment.queueId && session.mediaType === 'email') {
                                parkedEmails.push({
                                    conversationId: conv.conversationId,
                                    userId: participant.userId || 'N/A',
                                    queueId: segment.queueId
                                });
                                
                                uniqueQueues.add(segment.queueId);
                                if (participant.userId) uniqueUsers.add(participant.userId);
                            }
                        });
                    });
                });
            });

            // Update stats
            document.getElementById('totalConversations').textContent = parkedEmails.length;
            document.getElementById('uniqueQueues').textContent = uniqueQueues.size;
            document.getElementById('uniqueUsers').textContent = uniqueUsers.size;
            statsSection.classList.remove('hidden');

            if (parkedEmails.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        <p>No parked email conversations found</p>
                    </div>
                `;
                statsSection.classList.add('hidden');
                return;
            }

            // Create table with only conversationId, userId, and queueId
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Conversation ID</th>
                            <th>User ID</th>
                            <th>Queue ID</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            parkedEmails.forEach(item => {
                tableHTML += `
                    <tr>
                        <td>
                            <span style="font-family: monospace; font-size: 12px;">${item.conversationId}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${item.conversationId}')">📋</button>
                        </td>
                        <td>
                            <span style="font-family: monospace; font-size: 12px;">${item.userId}</span>
                            ${item.userId !== 'N/A' ? `<button class="copy-btn" onclick="copyToClipboard('${item.userId}')">📋</button>` : ''}
                        </td>
                        <td>
                            <span style="font-family: monospace; font-size: 12px;">${item.queueId}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${item.queueId}')">📋</button>
                        </td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            tableContainer.innerHTML = tableHTML;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showStatus('✅ Copied to clipboard!', 'success');
            }).catch(err => {
                showStatus('❌ Failed to copy', 'error');
            });
        }
    </script>
</body>
</html>
